name: Build and Pack

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check C# Formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic

      - name: Check Rust Formatting
        run: cargo fmt --all -- --check
        working-directory: typst_interop

  build-native:
    name: Build Native (${{ matrix.rid }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            rid: win-arm64
            target: aarch64-pc-windows-msvc
          - os: ubuntu-latest
            rid: linux-x64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            rid: linux-arm64
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            rid: osx-x64
            target: x86_64-apple-darwin
          - os: macos-latest
            rid: osx-arm64
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ARM64 Linker (Linux)
        if: matrix.rid == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build Native Library
        run: |
          dotnet build TypstInterop/TypstInterop.csproj -c Release -r ${{ matrix.rid }} -p:RustTarget=${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload Native Binary
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: TypstInterop/runtimes/${{ matrix.rid }}/native/*

  pack:
    name: Pack NuGet
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Download All Native Binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize Runtimes
        run: |
          mkdir -p TypstInterop/runtimes/win-x64/native
          mkdir -p TypstInterop/runtimes/win-arm64/native
          mkdir -p TypstInterop/runtimes/linux-x64/native
          mkdir -p TypstInterop/runtimes/linux-arm64/native
          mkdir -p TypstInterop/runtimes/osx-x64/native
          mkdir -p TypstInterop/runtimes/osx-arm64/native
          
          cp artifacts/native-win-x64/* TypstInterop/runtimes/win-x64/native/
          cp artifacts/native-win-arm64/* TypstInterop/runtimes/win-arm64/native/
          cp artifacts/native-linux-x64/* TypstInterop/runtimes/linux-x64/native/
          cp artifacts/native-linux-arm64/* TypstInterop/runtimes/linux-arm64/native/
          cp artifacts/native-osx-x64/* TypstInterop/runtimes/osx-x64/native/
          cp artifacts/native-osx-arm64/* TypstInterop/runtimes/osx-arm64/native/

      - name: Build and Pack
        run: |
          dotnet build TypstInterop.slnx -c Release -p:BuildRust=false
          dotnet pack TypstInterop/TypstInterop.csproj -c Release -p:BuildRust=false --output ./nupkg

      - name: Upload NuGet Package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./nupkg/*.nupkg

      - name: Push to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./nupkg/*.nupkg
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
