name: Build and Pack

# CI for every push to main and every PR: runs the full reusable build pipeline
# (_build.yml) -- CI image, lint, test, the cross-platform native matrix, pack
# and SBOMs. A manual run with `publish: true` additionally pushes the resulting
# packages to NuGet and GitHub Packages.
#
# Releases (version bump + tag + GitHub Release) are NOT handled here -- they go
# through release.yml. Note also that a push/tag made by the release workflow's
# GITHUB_TOKEN does not trigger this workflow (GitHub suppresses workflow events
# for GITHUB_TOKEN-authored pushes), which is why release.yml drives the full
# build/publish itself rather than relying on a tag trigger here.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to NuGet and GitHub Packages'
        type: boolean
        default: false

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/_build.yml
    # ref omitted -> _build.yml checks out the event default (push SHA / PR merge ref).

  publish:
    name: Publish
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_publish.yml
    secrets: inherit
