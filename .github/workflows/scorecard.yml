name: OpenSSF Scorecard

on:
  # Re-run when branch protection rules change so the score stays current.
  branch_protection_rule:
  # Weekly run keeps the scorecard fresh and re-uploads to the Security tab.
  schedule:
    - cron: '0 7 * * 1'
  push:
    branches: [ main ]

# Drop everything by default; each capability is granted explicitly below.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the SARIF results to the code-scanning dashboard.
      security-events: write
      # Needed for the OIDC token the scorecard action uses to publish results.
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to the public OpenSSF REST API so the project can
          # display a Scorecard badge. Set to false if results should stay
          # internal to the Security tab only.
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
        with:
          sarif_file: results.sarif
