name: OpenSSF Scorecard

on:
  # Re-run when branch protection rules change so the score stays current.
  branch_protection_rule:
  # Weekly run keeps the scorecard fresh and re-uploads to the Security tab.
  schedule:
    - cron: '0 7 * * 1'
  push:
    branches: [ main ]

# Drop everything by default; each capability is granted explicitly below.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the SARIF results to the code-scanning dashboard.
      security-events: write
      # Needed for the OIDC token the scorecard action uses to publish results.
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to the public OpenSSF REST API so the project can
          # display a Scorecard badge. Set to false if results should stay
          # internal to the Security tab only.
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: results.sarif
